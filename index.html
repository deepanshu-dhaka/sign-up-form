<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="main-container">
      <div class="background-image-and-logo-section">
        <img
          src="images/background-image.jpg"
          alt="close up image of a plant, showing its elongated laeaves"
        />
        <div class="logo-and-heading">
          <img src="images/odin-lined.png" alt="logo of the website" />
          <p>ODIN</p>
        </div>
      </div>

      <div class="form-section">
        <div class="text">
          <p>
            This is not a real online service! You know you need something like
            this in your life to help you realize your deepest dreams. <br />
            Sign-up <em>now</em> to get started.
          </p>
          <p>You <em>know</em> you want to.</p>
        </div>

        <form action="" id="myform">
          <div class="actual-form-section">
            <p>Let's do this</p>

            <div class="first-and-last-name-form-control">
              <div class="first-name-input-field">
                <label for="first-name">FIRST NAME</label>
                <input type="text" id="first-name" name="first-name" />
              </div>

              <div class="last-name-input-field">
                <label for="last-name">LAST NAME</label>
                <input type="text" id="last-name" name="last-name" />
              </div>
            </div>

            <div class="email-and-phone-number-form-control">
              <div class="email-input-field">
                <label for="email">EMAIL</label>
                <input type="email" id="email" name="email" />
              </div>

              <div class="phone-number-input-field">
                <label for="phone-number">PHONE NUMBER</label>
                <input type="tel" id="phone-number" name="phone-number" />
              </div>
            </div>

            <div class="password-and-confirm-password-form-control">
              <div class="password-input-field">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" name="password" />
              </div>

              <div class="confirm-password-input-field">
                <label for="confirm-password">CONFIRM PASSWORD</label>
                <input
                  type="password"
                  id="confirm-password"
                  name="confirm-password"
                />
              </div>
            </div>
          </div>
          <div class="create-account-and-login-section">
            <button type="submit" form="myform">Create Account</button>
            <p>Already have an account? <span>Log in</span></p>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
